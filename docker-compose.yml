version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-chat-db
    environment:
      POSTGRES_USER: aichat
      POSTGRES_PASSWORD: aichat_secret
      POSTGRES_DB: ai_chat_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aichat -d ai_chat_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
